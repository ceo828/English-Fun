<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잉글리쉬 친구 🌟 AI 영어 선생님</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Jua&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #e0f7fa 0%, #f3e5f5 50%, #e8f5e9 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px;
}

/* ── 헤더 ── */
.header { text-align:center; margin-bottom:10px; width:100%; max-width:620px; }
.header h1 {
  font-family:'Jua',sans-serif;
  font-size: clamp(1.6rem,5vw,2.2rem);
  color:#1a237e;
  text-shadow:2px 2px 0 rgba(108,99,255,.2);
}
.header h1 span {
  background:linear-gradient(135deg,#FF6584,#6C63FF,#43C6AC);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.header p { font-size:.82rem; color:#5c6bc0; font-weight:700; margin-top:2px; }

/* ── API 카드 ── */
.api-wrap { width:100%; max-width:620px; margin-bottom:10px; }
.api-card {
  background:white; border-radius:16px; padding:10px 14px;
  box-shadow:0 2px 12px rgba(108,99,255,.15); border:2px solid #c5cae9;
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.api-card label { font-size:.82rem; font-weight:800; color:#3f51b5; white-space:nowrap; }
.api-card input {
  flex:1; min-width:180px; padding:6px 10px;
  border:2px solid #c5cae9; border-radius:10px;
  font-size:.85rem; font-family:monospace; outline:none;
  transition:border .2s;
}
.api-card input:focus { border-color:#6C63FF; }
.api-save { background:linear-gradient(135deg,#6C63FF,#5c6bc0); color:white; border:none; border-radius:10px; padding:6px 14px; font-weight:800; cursor:pointer; font-size:.82rem; font-family:'Nunito',sans-serif; transition:transform .15s; }
.api-save:hover { transform:translateY(-1px); }
.api-badge { font-size:.75rem; font-weight:800; padding:4px 10px; border-radius:20px; white-space:nowrap; }
.api-badge.ok  { background:#e8f5e9; color:#2e7d32; }
.api-badge.no  { background:#fff3e0; color:#e65100; }

/* ── 모드 탭 ── */
.modes { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; width:100%; max-width:620px; }
.mode-btn {
  background:white; border:2.5px solid #e8eaf6; border-radius:14px;
  padding:7px 14px; font-weight:800; font-size:.84rem; cursor:pointer;
  color:#5c6bc0; transition:all .2s; font-family:'Nunito',sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.mode-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.12); }
.mode-btn.active { border-color:#6C63FF; background:linear-gradient(135deg,#ede7f6,#e8eaf6); color:#3f51b5; box-shadow:0 4px 14px rgba(108,99,255,.25); }

/* ── 채팅박스 ── */
.chat-box {
  width:100%; max-width:620px; background:white;
  border-radius:24px; box-shadow:0 8px 32px rgba(108,99,255,.15);
  border:2px solid #e8eaf6; overflow:hidden;
  display:flex; flex-direction:column;
}

/* 채팅 헤더 */
.chat-head {
  background:linear-gradient(135deg,#6C63FF,#7986cb);
  padding:12px 16px; display:flex; align-items:center; gap:10px;
}
.chat-avatar {
  width:44px; height:44px; background:white; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; box-shadow:0 2px 8px rgba(0,0,0,.15);
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.chat-head-text h2 { color:white; font-size:.95rem; font-weight:800; }
.chat-head-text p  { color:rgba(255,255,255,.8); font-size:.73rem; font-weight:600; }
.mode-badge { margin-left:auto; background:rgba(255,255,255,.2); color:white; padding:4px 10px; border-radius:20px; font-size:.73rem; font-weight:800; }

/* 진행 바 */
.prog-bar {
  padding:8px 14px; background:#f8f9ff; border-bottom:1px solid #e8eaf6;
  display:flex; align-items:center; gap:8px;
}
.prog-label { font-size:.73rem; font-weight:800; color:#5c6bc0; white-space:nowrap; }
.prog-track { flex:1; height:7px; background:#e8eaf6; border-radius:4px; overflow:hidden; }
.prog-fill  { height:100%; background:linear-gradient(90deg,#69f0ae,#4fc3f7,#6C63FF); border-radius:4px; transition:width .5s ease; width:0%; }

/* 단어 스트립 */
.word-strip {
  display:none; gap:8px; padding:8px 10px;
  overflow-x:auto; border-bottom:1px solid #e8eaf6; background:#fafbff;
  scrollbar-width:none;
}
.word-strip::-webkit-scrollbar { display:none; }
.word-card {
  background:white; border:2px solid #e8eaf6; border-radius:12px;
  padding:6px 12px; cursor:pointer; flex-shrink:0; text-align:center;
  transition:all .2s;
}
.word-card:hover { border-color:#6C63FF; transform:translateY(-3px); box-shadow:0 6px 16px rgba(108,99,255,.25); }
.word-card .en { font-weight:800; color:#3f51b5; font-size:.82rem; }
.word-card .ko { font-size:.68rem; color:#9e9e9e; margin-top:1px; }

/* 롤플레이 상황 */
.scenes {
  display:none; gap:6px; padding:8px 10px; flex-wrap:wrap;
  border-bottom:1px solid #e8eaf6; background:#fafbff;
}
.scene-btn {
  background:white; border:2px solid #e8eaf6; border-radius:12px;
  padding:5px 10px; font-weight:800; font-size:.78rem; cursor:pointer;
  color:#5c6bc0; transition:all .2s; font-family:'Nunito',sans-serif;
}
.scene-btn:hover, .scene-btn.active { border-color:#6C63FF; background:linear-gradient(135deg,#e8eaf6,#f3e5f5); }

/* 메시지 영역 */
.messages {
  flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:8px;
  min-height:260px; max-height:360px;
  scrollbar-width:thin; scrollbar-color:#c5cae9 transparent;
}
.msg { display:flex; gap:6px; align-items:flex-end; animation:msgIn .3s ease-out; }
.msg.user { flex-direction:row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg-av {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:.9rem;
}
.msg.ai   .msg-av { background:linear-gradient(135deg,#e3f2fd,#ede7f6); }
.msg.user .msg-av { background:linear-gradient(135deg,#fff9c4,#ffccbc); }

.bubble {
  max-width:78%; padding:9px 13px; font-size:.88rem;
  line-height:1.65; font-weight:600;
}
.msg.ai   .bubble { background:linear-gradient(135deg,#f3f4ff,#ede7f6); color:#1a237e; border-radius:18px 18px 18px 4px; border:1.5px solid #e8eaf6; }
.msg.user .bubble { background:linear-gradient(135deg,#6C63FF,#7986cb); color:white; border-radius:18px 18px 4px 18px; }

.speak-btn {
  display:inline-block; margin-top:5px;
  background:none; border:1.5px solid #c5cae9; color:#5c6bc0;
  border-radius:8px; padding:2px 8px; font-size:.7rem; cursor:pointer;
  font-weight:700; transition:all .2s; font-family:'Nunito',sans-serif;
}
.speak-btn:hover { background:#e8eaf6; }

/* 타이핑 인디케이터 */
.typing-wrap { display:flex; gap:6px; align-items:flex-end; }
.typing-bubble {
  padding:10px 14px; border-radius:18px 18px 18px 4px;
  background:linear-gradient(135deg,#f3f4ff,#ede7f6); border:1.5px solid #e8eaf6;
  display:flex; gap:5px; align-items:center;
}
.dot {
  width:7px; height:7px; border-radius:50%; background:#7986cb;
  animation:bounce 1s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

/* 퀵 답변 */
.quick-area { padding:5px 10px 3px; display:flex; gap:5px; flex-wrap:wrap; border-top:1px solid #f0f0f8; }
.quick-btn {
  background:white; border:2px solid #e0e0e0; color:#5c6bc0;
  border-radius:20px; padding:3px 10px; font-size:.73rem; font-weight:700;
  cursor:pointer; transition:all .15s; font-family:'Nunito',sans-serif;
}
.quick-btn:hover { transform:translateY(-1px); background:#e8eaf6; border-color:#c5cae9; }

/* 입력 영역 */
.input-area {
  padding:10px; border-top:1.5px solid #e8eaf6;
  display:flex; gap:6px; align-items:flex-end; background:#fafbff;
}
.text-input {
  flex:1; border:2px solid #c5cae9; border-radius:14px;
  padding:9px 12px; font-size:.88rem; outline:none;
  font-family:'Nunito',sans-serif; font-weight:600;
  resize:none; min-height:44px; max-height:120px; line-height:1.5;
  color:#1a237e; transition:border .2s;
}
.text-input:focus { border-color:#6C63FF; }
.text-input::placeholder { color:#b0bec5; }

.icon-btn {
  width:44px; height:44px; border-radius:13px; border:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; flex-shrink:0; transition:all .2s;
}
.mic-btn { background:linear-gradient(135deg,#FFD54F,#FF7043); box-shadow:0 3px 10px rgba(255,112,67,.3); }
.mic-btn:hover { transform:scale(1.08); }
.mic-btn.rec { background:linear-gradient(135deg,#ef5350,#e53935); animation:pulse .8s ease-in-out infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(239,83,80,.4)} 70%{box-shadow:0 0 0 10px rgba(239,83,80,0)} 100%{box-shadow:0 0 0 0 rgba(239,83,80,0)} }
.send-btn { background:linear-gradient(135deg,#6C63FF,#5c6bc0); box-shadow:0 3px 10px rgba(108,99,255,.4); color:white; font-size:1rem; font-weight:900; }
.send-btn:hover { transform:scale(1.08); }

/* 팁 박스 */
.tip { background:linear-gradient(135deg,#fff9c4,#fffde7); border:2px dashed #FFD54F; border-radius:16px; padding:8px 12px; margin-top:10px; font-size:.82rem; color:#F57F17; font-weight:700; text-align:center; width:100%; max-width:620px; }

/* 축하 팝업 */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:100; }
.overlay.show { display:flex; }
.celebrate-card { background:white; border-radius:24px; padding:2rem 2.5rem; text-align:center; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); box-shadow:0 20px 60px rgba(0,0,0,.25); }
@keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.cel-close { background:linear-gradient(135deg,#6C63FF,#7986cb); color:white; border:none; border-radius:12px; padding:10px 24px; font-weight:800; cursor:pointer; font-size:.95rem; font-family:'Nunito',sans-serif; margin-top:14px; }

@media(max-width:480px){
  .mode-btn{font-size:.78rem;padding:6px 10px;}
  .messages{max-height:300px;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1>🌟 <span>잉글리쉬 친구</span> 🌟</h1>
  <p>AI 영어 선생님과 함께 재미있게 배워요! ✨</p>
</div>

<!-- API 키 -->
<div class="api-wrap">
  <div class="api-card">
    <label>🔑 Claude API 키</label>
    <input type="password" id="apiInput" placeholder="sk-ant-api03-..." />
    <button class="api-save" onclick="saveKey()">저장</button>
    <span class="api-badge no" id="apiBadge">⚠️ 미설정</span>
  </div>
</div>

<!-- 모드 탭 -->
<div class="modes">
  <button class="mode-btn active" onclick="changeMode('chat',this)">💬 자유 대화</button>
  <button class="mode-btn" onclick="changeMode('words',this)">📚 단어 학습</button>
  <button class="mode-btn" onclick="changeMode('roleplay',this)">🎭 롤플레이</button>
  <button class="mode-btn" onclick="changeMode('quiz',this)">🎯 퀴즈</button>
</div>

<!-- 채팅박스 -->
<div class="chat-box">
  <!-- 헤더 -->
  <div class="chat-head">
    <div class="chat-avatar" id="aiAvatar">🦉</div>
    <div class="chat-head-text">
      <h2>올리버 선생님</h2>
      <p id="aiDesc">무엇이든 물어보세요! 💬</p>
    </div>
    <div class="mode-badge" id="modeBadge">자유 대화</div>
  </div>

  <!-- 진행 바 -->
  <div class="prog-bar">
    <span class="prog-label">오늘의 학습</span>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <span id="stars">⭐</span>
    <span class="prog-label" id="scoreLabel">0점</span>
  </div>

  <!-- 단어 카드 스트립 -->
  <div class="word-strip" id="wordStrip"></div>

  <!-- 롤플레이 상황 -->
  <div class="scenes" id="scenes">
    <button class="scene-btn active" onclick="changeScene('cafe',this)">☕ 카페</button>
    <button class="scene-btn" onclick="changeScene('school',this)">🏫 학교</button>
    <button class="scene-btn" onclick="changeScene('shopping',this)">🛍️ 쇼핑</button>
    <button class="scene-btn" onclick="changeScene('park',this)">🌳 공원</button>
    <button class="scene-btn" onclick="changeScene('hospital',this)">🏥 병원</button>
  </div>

  <!-- 메시지 -->
  <div class="messages" id="messages"></div>

  <!-- 퀵 버튼 -->
  <div class="quick-area" id="quickArea"></div>

  <!-- 입력 -->
  <div class="input-area">
    <textarea class="text-input" id="userInput" placeholder="영어나 한국어로 말해보세요! 😊" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="icon-btn mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="icon-btn send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="tip">💡 마이크 🎤 버튼으로 음성 입력 가능! (Chrome 권장) &nbsp;|&nbsp; 틀려도 괜찮아요 😄</div>

<!-- 축하 팝업 -->
<div class="overlay" id="overlay">
  <div class="celebrate-card">
    <div style="font-size:3.5rem">🎉</div>
    <div style="font-family:'Jua',sans-serif;font-size:1.5rem;color:#1a237e;margin:6px 0">대단해요!</div>
    <div style="color:#5c6bc0;font-weight:700;font-size:.9rem" id="celMsg">영어 실력이 쑥쑥 늘고 있어요! 🚀</div>
    <button class="cel-close" onclick="document.getElementById('overlay').classList.remove('show')">계속하기 →</button>
  </div>
</div>

<script>
// ════════════════════════════════════
//  상수
// ════════════════════════════════════
const WORDS = [
  {en:'apple',ko:'사과',emoji:'🍎'},{en:'school',ko:'학교',emoji:'🏫'},
  {en:'friend',ko:'친구',emoji:'👫'},{en:'happy',ko:'행복한',emoji:'😊'},
  {en:'beautiful',ko:'아름다운',emoji:'🌸'},{en:'run',ko:'달리다',emoji:'🏃'},
  {en:'book',ko:'책',emoji:'📚'},{en:'music',ko:'음악',emoji:'🎵'},
  {en:'family',ko:'가족',emoji:'👨‍👩‍👧'},{en:'dream',ko:'꿈',emoji:'💭'},
  {en:'sky',ko:'하늘',emoji:'🌤️'},{en:'water',ko:'물',emoji:'💧'},
];

const SCENES = {
  cafe:    {name:'카페',    emoji:'☕', ctx:'a coffee shop — help order drinks/food, greet barista, ask for the bill'},
  school:  {name:'학교',   emoji:'🏫', ctx:'a school — talk to teachers/friends, ask questions about subjects'},
  shopping:{name:'쇼핑몰', emoji:'🛍️', ctx:'a shopping mall — ask for items, check prices, choose sizes/colors'},
  park:    {name:'공원',   emoji:'🌳', ctx:'a park — make friends, talk about hobbies and weather'},
  hospital:{name:'병원',   emoji:'🏥', ctx:'a hospital — describe symptoms, ask questions to the doctor'},
};

const QUICK = {
  chat:    ['다시 설명해줘요 🙏','발음 알려줘요 🔤','예문 더 주세요 📝','쉽게 말해줘요 😅'],
  words:   ['예문 만들어줘요 ✏️','퀴즈 내주세요 🎯','다음 단어 →','비슷한 단어는?'],
  roleplay:['다시 해볼게요 🔄','힌트 주세요 💡','한국어로 먼저 🇰🇷','다른 상황으로'],
  quiz:    ['힌트 주세요 💡','더 쉽게 해줘요','다음 문제 →','점수 알려줘요'],
};

const CEL_MSGS = [
  '영어 실력이 쑥쑥 늘고 있어요! 🚀',
  '정말 대단한 학습자예요! 🏆',
  '오늘도 열심히 했어요! 🌟',
  '계속 이렇게 해봐요! 💪',
];

// ════════════════════════════════════
//  상태
// ════════════════════════════════════
let apiKey  = localStorage.getItem('eng_key') || '';
let mode    = 'chat';
let scene   = 'cafe';
let score   = 0;
let history = [];   // [{role,content}]
let recog   = null;
let isRec   = false;

// ════════════════════════════════════
//  초기화
// ════════════════════════════════════
window.onload = () => {
  if (apiKey) {
    document.getElementById('apiInput').value = apiKey;
    setApiOk(true);
  }
  renderWordStrip();
  renderQuick();
  addMsg('ai', '안녕하세요! 저는 **올리버 선생님** 이에요! 🦉✨\n\n오늘 영어 공부를 같이 해요!\n위에서 학습 모드를 선택하거나 바로 말해보세요 😊');
};

// ════════════════════════════════════
//  API 키
// ════════════════════════════════════
function saveKey() {
  const v = document.getElementById('apiInput').value.trim();
  if (!v.startsWith('sk-')) { alert('올바른 API 키를 입력해주세요!\n(sk-ant-... 로 시작해야 해요)'); return; }
  apiKey = v;
  localStorage.setItem('eng_key', v);
  setApiOk(true);
  addMsg('ai', '🎉 API 키 저장 완료! 이제 진짜 AI 선생님과 대화할 수 있어요!');
}
function setApiOk(ok) {
  const b = document.getElementById('apiBadge');
  b.textContent = ok ? '✅ 연결됨' : '⚠️ 미설정';
  b.className   = 'api-badge ' + (ok ? 'ok' : 'no');
}

// ════════════════════════════════════
//  모드
// ════════════════════════════════════
const MODE_META = {
  chat:    {icon:'💬', label:'자유 대화',  desc:'무엇이든 물어보세요! 💬'},
  words:   {icon:'📚', label:'단어 학습',  desc:'새 단어를 배워봐요 📖'},
  roleplay:{icon:'🎭', label:'롤플레이',   desc:'상황 연기해봐요 🎭'},
  quiz:    {icon:'🎯', label:'퀴즈',       desc:'실력을 확인해요! 🏆'},
};

function changeMode(m, btn) {
  mode = m; history = [];
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const meta = MODE_META[m];
  document.getElementById('aiAvatar').textContent  = meta.icon;
  document.getElementById('aiDesc').textContent    = meta.desc;
  document.getElementById('modeBadge').textContent = meta.label;
  document.getElementById('wordStrip').style.display = m==='words'    ? 'flex' : 'none';
  document.getElementById('scenes').style.display    = m==='roleplay' ? 'flex' : 'none';

  renderQuick();
  clearMessages();

  const intros = {
    chat:    '💬 **자유 대화 모드**예요!\n\n영어로 무엇이든 물어보세요. 한국어도 OK! 😊',
    words:   '📚 **단어 학습 모드**예요!\n\n단어 카드를 클릭하거나 배우고 싶은 단어를 입력해요! ✨',
    roleplay:`🎭 **롤플레이 모드**예요!\n\n**${SCENES[scene].name}** ${SCENES[scene].emoji} 상황으로 영어 대화 연습!\n\nHello! How can I help you? 😊`,
    quiz:    '🎯 **퀴즈 모드**예요!\n\n영어 실력을 테스트해봐요!\n**"시작해요!"** 라고 입력해보세요 🏆',
  };
  addMsg('ai', intros[m]);
}

function changeScene(s, btn) {
  scene = s; history = [];
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  clearMessages();
  addMsg('ai', `🎭 이제 **${SCENES[s].name}** ${SCENES[s].emoji} 상황이에요!\n\n제가 역할을 맡을게요. 영어로 시작해봐요!\n\nHello! How can I help you today? 😊`);
}

// ════════════════════════════════════
//  시스템 프롬프트
// ════════════════════════════════════
function buildSystem() {
  const base = `You are "Oliver" (올리버), a super friendly English tutor for Korean 5th graders (age 10-11).
RULES:
- Always explain in Korean (한국어). Show English clearly then explain in Korean.
- Simple words, short sentences. Max 120 words per response.
- Use lots of emojis 😊🌟✨
- Praise EVERY attempt: "잘했어요!", "훌륭해요!", "완벽해요!", "대단해요!"
- Mark important English with **word** (double asterisks)
- Never criticize, always encourage warmly`;

  if (mode==='chat')     return base+'\nMODE: Free conversation. Help student express in English, explain simply in Korean.';
  if (mode==='words')    return base+'\nMODE: Vocabulary. For each word: show word + Korean phonetics + meaning + 2 fun example sentences with emojis.';
  if (mode==='roleplay') return base+`\nMODE: Roleplay in ${SCENES[scene].ctx}. Speak as a character in English, then give Korean translation + hints. Encourage English responses.`;
  if (mode==='quiz')     return base+'\nMODE: Quiz. Create fun English quizzes for 5th grade Koreans. Vocabulary, simple grammar, fill-in-blank. Immediate encouraging feedback.';
  return base;
}

// ════════════════════════════════════
//  메시지 전송  ★ CORS 수정 핵심 ★
// ════════════════════════════════════
async function sendMsg() {
  const inp = document.getElementById('userInput');
  const txt = inp.value.trim();
  if (!txt) return;

  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', txt);
  history.push({role:'user', content:txt});

  if (!apiKey) {
    addMsg('ai', '⚠️ **API 키가 없어요!**\n\n위쪽 입력칸에 Claude API 키를 넣고 저장 버튼을 눌러주세요!\n\n🔗 **console.anthropic.com** 에서 무료로 발급받을 수 있어요 😊');
    return;
  }

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'x-api-key':     apiKey,
        'anthropic-version': '2023-06-01',
        // ★ 이 헤더가 CORS 오류를 해결해요! ★
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: 500,
        system:     buildSystem(),
        messages:   history.slice(-12),
      }),
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      // API 키 오류 메시지를 한국어로 친절하게
      let errMsg = '❌ 오류가 발생했어요!\n\n';
      if (data.error.type === 'authentication_error') {
        errMsg += 'API 키가 올바르지 않아요. 키를 다시 확인해주세요! 🔑';
      } else if (data.error.type === 'overloaded_error') {
        errMsg += 'AI가 너무 바빠요. 잠깐 후 다시 해보세요! 😅';
      } else {
        errMsg += data.error.message;
      }
      addMsg('ai', errMsg);
      return;
    }

    const reply = data.content[0].text;
    history.push({role:'assistant', content:reply});
    addMsg('ai', reply, true);

    // 점수 추가
    score += 10;
    updateScore();
    if (score % 50 === 0) celebrate();

    // 롤플레이는 자동 음성
    if (mode === 'roleplay') {
      setTimeout(() => speak(reply.replace(/\*\*(.*?)\*\*/g,'$1')), 400);
    }

  } catch(e) {
    hideTyping();
    addMsg('ai', `❌ 연결 오류: ${e.message}\n\n인터넷 연결을 확인하거나 API 키를 다시 확인해주세요!`);
  }
}

// ════════════════════════════════════
//  메시지 UI
// ════════════════════════════════════
function addMsg(role, text, withSpeak=false) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role==='ai' ? '🦉' : '😊';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = fmtText(text);

  if (role==='ai' && withSpeak) {
    const sb = document.createElement('button');
    sb.className = 'speak-btn';
    sb.textContent = '🔊 듣기';
    sb.onclick = () => speak(text.replace(/\*\*(.*?)\*\*/g,'$1'));
    bub.appendChild(document.createElement('br'));
    bub.appendChild(sb);
  }

  div.appendChild(av);
  div.appendChild(bub);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function fmtText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:#3f51b5">$1</strong>')
    .replace(/\n/g,'<br>');
}

let typingEl = null;
function showTyping() {
  const box = document.getElementById('messages');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `<div class="msg-av" style="background:linear-gradient(135deg,#e3f2fd,#ede7f6)">🦉</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  box.appendChild(typingEl);
  box.scrollTop = box.scrollHeight;
}
function hideTyping() { typingEl?.remove(); typingEl=null; }
function clearMessages() { document.getElementById('messages').innerHTML=''; }

// ════════════════════════════════════
//  점수
// ════════════════════════════════════
function updateScore() {
  document.getElementById('scoreLabel').textContent = `${score}점`;
  document.getElementById('progFill').style.width   = `${Math.min((score/300)*100,100)}%`;
  document.getElementById('stars').textContent       = '⭐'.repeat(Math.min(Math.floor(score/50)+1,5));
}
function celebrate() {
  document.getElementById('celMsg').textContent = CEL_MSGS[Math.floor(Math.random()*CEL_MSGS.length)];
  document.getElementById('overlay').classList.add('show');
}

// ════════════════════════════════════
//  음성 TTS
// ════════════════════════════════════
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.substring(0,200));
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1;
  speechSynthesis.speak(u);
}

// ════════════════════════════════════
//  음성 STT
// ════════════════════════════════════
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Chrome 브라우저에서만 음성 입력이 가능해요! 🌐'); return; }
  if (isRec) { recog?.stop(); return; }

  recog = new SR();
  recog.lang = mode==='roleplay' ? 'en-US' : 'ko-KR';
  recog.onstart  = () => { isRec=true;  document.getElementById('micBtn').classList.add('rec');    document.getElementById('micBtn').textContent='🔴'; };
  recog.onend    = () => { isRec=false; document.getElementById('micBtn').classList.remove('rec'); document.getElementById('micBtn').textContent='🎤'; };
  recog.onresult = e  => { document.getElementById('userInput').value=e.results[0][0].transcript; sendMsg(); };
  recog.onerror  = () => { isRec=false; document.getElementById('micBtn').classList.remove('rec'); document.getElementById('micBtn').textContent='🎤'; };
  recog.start();
}

// ════════════════════════════════════
//  단어 카드 렌더
// ════════════════════════════════════
function renderWordStrip() {
  const strip = document.getElementById('wordStrip');
  WORDS.forEach(w => {
    const c = document.createElement('div');
    c.className='word-card';
    c.innerHTML=`<div style="font-size:1.1rem">${w.emoji}</div><div class="en">${w.en}</div><div class="ko">${w.ko}</div>`;
    c.onclick=()=>{ document.getElementById('userInput').value=`"${w.en}" 단어를 가르쳐주세요!`; sendMsg(); };
    strip.appendChild(c);
  });
}

// ════════════════════════════════════
//  퀵 버튼 렌더
// ════════════════════════════════════
function renderQuick() {
  const area = document.getElementById('quickArea');
  area.innerHTML='';
  (QUICK[mode]||[]).forEach(r=>{
    const b=document.createElement('button');
    b.className='quick-btn'; b.textContent=r;
    b.onclick=()=>{ document.getElementById('userInput').value=r; sendMsg(); };
    area.appendChild(b);
  });
}

// ════════════════════════════════════
//  기타
// ════════════════════════════════════
function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}
</script>
